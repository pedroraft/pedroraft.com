<div *ngFor="let item of indexFiltered">
  <h2 class="link" [routerLink]="['/post', item.slug]">{{item.title}}</h2>
  <span>{{item.date | date : 'fullDate'}}</span><br><br>
  <a *ngFor="let tag of item.tags" class="button button-outline button-sm" (click)="toggleTag(tag)"
     style="margin-left: 5px;" [ngClass]="{'active': tag === selectedTag}">{{tag}}</a>
  <hr>
</div>
<div *ngIf="indexFiltered?.length === 0">
  <h2>No post found, tag {{selectedTag}}</h2>
</div>
